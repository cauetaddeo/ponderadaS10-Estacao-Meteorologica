<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Leitura</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .form-container { background: white; padding: 25px; border-radius: 8px; width: 350px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px;}
        .form-container label { font-weight: bold; }
        .form-container input { width: 100%; padding: 8px; margin: 8px 0 20px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn-salvar { background: #4CAF50; color: white; padding: 10px 15px; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
        .btn-cancelar { margin-left: 15px; color: #f44336; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Editar Leitura #{{ leitura.id }}</h1>
    
    <div class="form-container">
        <form action="/editar/{{ leitura.id }}" method="POST">
            
            <label>Temperatura (°C):</label>
            <input type="number" step="0.01" name="temperatura" value="{{ leitura.temperatura }}" required>
            
            <label>Umidade (%):</label>
            <input type="number" step="0.01" name="umidade" value="{{ leitura.umidade }}" required>
            
            <label>Pressão (hPa):</label>
            <input type="number" step="0.01" name="pressao" value="{{ leitura.pressao or '' }}">
            
            <button type="submit" class="btn-salvar">Salvar Alterações</button>
            <a href="/historico" class="btn-cancelar">Cancelar</a>
        </form>
    </div>
</body>
</html>
